<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy New Year 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Pacifico&display=swap" rel="stylesheet">

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Montserrat',sans-serif;
}

/* YEAR */
#year{
    position:absolute;
    top:18%;
    width:100%;
    text-align:center;
    font-size:240px;
    z-index:5;
}

/* COUNTDOWN */
#count{
    position:absolute;
    top:55%;
    width:100%;
    text-align:center;
    font-size:260px;
    z-index:6;
}

/* HAPPY */
#happy{
    display:none;
    position:absolute;
    top:32%;
    width:100%;
    text-align:center;
    font-family:'Pacifico',cursive;
    font-size:120px;
    color:red;
    text-shadow:0 0 25px red,0 0 70px gold;
    z-index:8;
    animation:zoomIn 2s ease forwards, glow 3s infinite alternate;
}

@keyframes zoomIn{
    from{transform:scale(0.5);opacity:0}
    to{transform:scale(1);opacity:1}
}
@keyframes glow{
    from{text-shadow:0 0 20px red}
    to{text-shadow:0 0 80px gold}
}

/* CAPTION */
#caption{
    display:none;
    position:absolute;
    top:50%;
    width:100%;
    text-align:center;
    font-family:'Pacifico',cursive;
    font-size:64px;
    color:white;
    text-shadow:0 0 15px white;
    z-index:8;
    animation:fadeUp 3s ease forwards;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(40px)}
    to{opacity:1;transform:translateY(0)}
}

/* CANVAS */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:1;
}
</style>
</head>

<body>

<div id="year">2025</div>
<div id="count">5</div>

<div id="happy">🎆 Happy New Year 2026 🎆</div>

<div id="caption">
    Dear 2026,<br>
    Đi có người nhớ, về có người thương!
</div>

<canvas id="fireworks"></canvas>

<audio id="boom" src="https://cdn.pixabay.com/audio/2022/03/15/audio_7bdfb1b7a7.mp3"></audio>

<script>
/* ===== FIREWORK ENGINE ===== */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth; canvas.height=innerHeight;
window.onresize=()=>{canvas.width=innerWidth;canvas.height=innerHeight};

let rockets=[],particles=[];
const boom=document.getElementById("boom");
const rand=(a,b)=>Math.random()*(b-a)+a;

function launch(x=null){
    rockets.push({
        x:x ?? rand(100,canvas.width-100),
        y:canvas.height,
        vy:rand(-13,-16),
        explode:rand(canvas.height/4,canvas.height/2),
        color:`hsl(${rand(0,360)},100%,60%)`
    });
}

function explode(x,y,color,large=false){
    boom.currentTime=0; boom.play();
    let c=large?420:rand(80,160);
    for(let i=0;i<c;i++){
        let a=Math.random()*Math.PI*2;
        let s=large?rand(3,9):rand(2,6);
        particles.push({
            x,y,
            vx:Math.cos(a)*s,
            vy:Math.sin(a)*s,
            life:large?160:100,
            color
        });
    }
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    rockets.forEach((r,i)=>{
        r.y+=r.vy;
        ctx.fillStyle=r.color;
        ctx.fillRect(r.x,r.y,3,8);
        if(r.y<=r.explode){
            explode(r.x,r.y,r.color);
            rockets.splice(i,1);
        }
    });

    particles.forEach((p,i)=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.02;
        p.life--;
        ctx.fillStyle=p.color;
        ctx.fillRect(p.x,p.y,3,3);
        if(p.life<=0)particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}
animate();

/* ===== COUNTDOWN ===== */
let n=5;
let blink=true;
const count=document.getElementById("count");
const year=document.getElementById("year");
const happy=document.getElementById("happy");
const caption=document.getElementById("caption");

const blinkTimer=setInterval(()=>{
    count.style.visibility=blink?"hidden":"visible";
    blink=!blink;
},500);

const timer=setInterval(()=>{
    count.innerText=n;
    if(n===0){
        clearInterval(timer);
        clearInterval(blinkTimer);
        count.style.display="none";
        year.style.display="none";

        launch(canvas.width/2);
        setTimeout(()=>{
            explode(canvas.width/2,canvas.height/2,"white",true);
            happy.style.display="block";
        },700);

        setInterval(()=>launch(),600);

        /* HAPPY 30s → CAPTION */
        setTimeout(()=>{
            happy.style.opacity=0;
            setTimeout(()=>{
                happy.style.display="none";
                caption.style.display="block";
            },2000);
        },30000);
    }
    n--;
},1000);
</script>

</body>
</html>
